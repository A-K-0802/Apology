<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Memories - For Her</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      :root {
        --bg-start: #1a0b0b;
        --bg-end: #3b1111;
        --card: rgba(20, 8, 8, 0.84);
        --border: rgba(255, 209, 122, 0.45);
        --gold: #ffd17a;
        --red: #ff4d5a;
        --text: #fff7ea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: radial-gradient(circle at 20% 20%, var(--bg-end), var(--bg-start));
        color: var(--text);
      }

      .instructions {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        width: min(92vw, 560px);
        padding: 14px 16px;
        border-radius: 14px;
        background: var(--card);
        border: 1px solid var(--border);
        backdrop-filter: blur(8px);
        z-index: 10;
        text-align: center;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      }

      .instructions h1 {
        margin: 0 0 8px;
        font-size: 1.2rem;
        letter-spacing: 0.08em;
        color: var(--gold);
      }

      .instructions p {
        margin: 0;
        line-height: 1.4;
        font-size: 0.95rem;
      }

      .tip {
        position: fixed;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        width: min(92vw, 520px);
        z-index: 10;
        text-align: center;
        font-size: 0.9rem;
        color: #ffe8be;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
      }

      @media (max-width: 640px) {
        .instructions h1 {
          font-size: 1.04rem;
        }

        .instructions p,
        .tip {
          font-size: 0.86rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="instructions">
      <h1>FOR YOU</h1>
      <p>
        Allow camera access, then point your phone at a Hiro marker.
        Move around the marker to view all memories in AR.
      </p>
    </div>

    <div class="tip">
      Marker mode enabled. Print or show a standard Hiro marker before opening this page.
    </div>

    <a-scene
      embedded
      renderer="antialias: true; alpha: true"
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
    >
      <a-assets>
        <img id="m1" src="assets/memory-01.jpg" alt="Memory 1" />
        <img id="m2" src="assets/memory-02.jpg" alt="Memory 2" />
        <img id="m3" src="assets/memory-03.jpg" alt="Memory 3" />
        <img id="m4" src="assets/memory-04.jpg" alt="Memory 4" />
        <img id="m5" src="assets/memory-05.jpg" alt="Memory 5" />
        <img id="m6" src="assets/memory-06.jpg" alt="Memory 6" />
      </a-assets>

      <a-marker preset="hiro" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
        <a-entity position="0 1.25 0">
          <a-text
            value="I AM SORRY"
            color="#ff4d5a"
            align="center"
            width="3.2"
            shader="msdf"
            position="0 0.42 0"
          ></a-text>
          <a-animation
            attribute="position"
            from="0 1.22 0"
            to="0 1.32 0"
            direction="alternate"
            repeat="indefinite"
            dur="1800"
            easing="easeInOutSine"
          ></a-animation>
        </a-entity>

        <a-text
          value="I will always make you feel special"
          color="#ffd17a"
          align="center"
          width="2"
          position="0 0.78 -0.95"
        ></a-text>

        <a-text
          value="You are my world"
          color="#ffe6b5"
          align="center"
          width="2"
          position="0.95 0.78 0"
          rotation="0 -90 0"
        ></a-text>

        <a-text
          value="I am sorry for being a dumb guy"
          color="#ffe6b5"
          align="center"
          width="2"
          position="-0.95 0.78 0"
          rotation="0 90 0"
        ></a-text>

        <a-text
          value="I am yours always"
          color="#ffe6b5"
          align="center"
          width="2"
          position="0 0.78 0.95"
          rotation="0 180 0"
        ></a-text>

        <a-text
          value="Please forgive me"
          color="#ffd17a"
          align="center"
          width="2"
          position="0 1.48 0"
          rotation="90 0 0"
        ></a-text>

        <a-image
          src="#m1"
          position="-0.55 0.58 -0.82"
          rotation="0 18 0"
          width="0.46"
          height="0.62"
          material="shader: flat"
        ></a-image>

        <a-image
          src="#m2"
          position="0.55 0.58 -0.82"
          rotation="0 -18 0"
          width="0.46"
          height="0.62"
          material="shader: flat"
        ></a-image>

        <a-image
          src="#m3"
          position="0.9 0.58 0"
          rotation="0 -90 0"
          width="0.45"
          height="0.6"
          material="shader: flat"
        ></a-image>

        <a-image
          src="#m4"
          position="-0.9 0.58 0"
          rotation="0 90 0"
          width="0.45"
          height="0.6"
          material="shader: flat"
        ></a-image>

        <a-image
          src="#m5"
          position="0.45 0.58 0.8"
          rotation="0 160 0"
          width="0.45"
          height="0.6"
          material="shader: flat"
        ></a-image>

        <a-image
          src="#m6"
          position="-0.45 0.58 0.8"
          rotation="0 -160 0"
          width="0.45"
          height="0.6"
          material="shader: flat"
        ></a-image>

        <a-torus
          position="0 0.22 -0.55"
          radius="0.18"
          radius-tubular="0.04"
          color="#ff4d5a"
          arc="330"
          rotation="0 0 20"
        >
          <a-animation
            attribute="rotation"
            to="0 360 20"
            loop="true"
            dur="2800"
            easing="linear"
          ></a-animation>
        </a-torus>

        <a-entity light="type: ambient; intensity: 0.95; color: #ffffff"></a-entity>
        <a-entity light="type: directional; intensity: 0.55; color: #ffd17a" position="0.5 2 0.8"></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
